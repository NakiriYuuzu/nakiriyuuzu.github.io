<!DOCTYPE html>
<html>
<meta charset="utf-8"/>
<title>Good Websites</title>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
$(window).on("load resize ", function() {
  var scrollWidth = $('.tbl-content').width() - $('.tbl-content table').width();
  $('.tbl-header').css({'padding-right':scrollWidth});
}).resize();
</script>
<style type="text/css">

body, html{
  height: 100%;
  margin: 0;
  font-family: 'Noto Sans TC', Bold, monospace;
}

*{
  box-sizing: border-box;
}

h1{
  font-size: 30px;
  color: rgba(0, 0, 0, 0.7);
  text-transform: uppercase;
  font-weight: 550;
  font-family: 'Roboto', sans-serif;
  text-align: center;
  margin-top: 50px;
  margin-bottom: 50px;
}

table{
  width:100%;
  table-layout: fixed;
}

.tbl-header{
  background-color: rgba(0, 0, 0,0.2);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
 }
 
.tbl-content{
  height: auto;
  overflow-x:auto;
  margin-top: 0px;
  border: 1px solid rgba(0, 0, 0,0.1);
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

th{
  padding: 20px 15px;
  text-align: center;
  font-weight: 700;
  font-size: 21px;
  color: rgba(0,0,0,0.7);
  text-transform: uppercase;
  font-family: 'Noto Sans TC', Bold, sans-serif;
}

td{
  padding: 15px;
  text-align: center;
  vertical-align:middle;
  font-weight: 500;
  font-size: 17px;
  font-family: 'Noto Sans TC', times, fantasy;
  color: rgba(0,0,0,0.7);
  border: solid 1px rgba(0, 0, 0, 0.1);
}

.th01, .td01{
  width: 10%;
}

tr:nth-child(even){
  background-color: rgba(20, 20, 20, 0.1);
}
	
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap');
@import url(https://fonts.googleapis.com/css?family=Roboto:400,500,300,700);
	
section{
  border: 3px solid rgba(241,241,241,0.5);
  border-radius: 50px;
  background-color: rgba(255,255,255,0.3);
  top: 50%;
  left: 50%;
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 80%;
  padding-top: 1px;
  padding-left: 50px;
  padding-right: 50px;
  padding-bottom: 50px;
}

.bg-image{
  height: 100%;
  background: -webkit-linear-gradient(to bottom right, #737DFE, #FFCAC9);
  background: linear-gradient(to bottom right, #737DFE, #FFCAC9);
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
}

@media (max-width: 650px) {
  section {
  	top: 25%;
	left: 25%;
	position: absolute;
    transform: translate(-25%, -25%);
  }
}

</style>
</head>
<body>
<div class="bg-image"></div>
<section>
  <h1>Website Compare</h1>
  <div class="tbl-header">
    <table cellpadding="0" cellspacing="0" border="0">
      <thead>
        <tr>
		  <th class="th01">序</th>
          <th>比較準則</th>
          <th>好的網頁</th>
          <th>不好的網頁</th>
        </tr>
      </thead>
    </table>
  </div>
  <div class="tbl-content">
    <table cellpadding="0" cellspacing="0" border="0">
      <tbody>
        <tr>
		  <td class="td01">1</td>
          <td>主題明確</td>
          <td>主題是網頁的核心</td>
          <td>每個看起來都像主題</td>
        </tr>
		<tr>
		  <td class="td01">2</td>
          <td>色彩運用</td>
          <td>分明强調的色彩</td>
          <td>與主題不搭的顔色</td>
        </tr>
		<tr>
		  <td class="td01">3</td>
		  <td>空間配置</td>
          <td>内容都與主題有關</td>
          <td>放入一些多餘的東西</td>
        </tr>
		<tr>
		  <td class="td01">4</td>
          <td>導覽功能</td>
          <td>導覽列會跟隨使用者</td>
          <td>沒有導覽列等</td>
        </tr>
		<tr>
		  <td class="td01">5</td>
          <td>使用者體驗</td>
          <td>具有一致性和規則性</td>
          <td>不規律的排版</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
