<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Hello World</title>
	
<style>
:root {
  --main-bg: black;
  --thumb-bg: #fff;
  --shadow: #ffae42;
}

@font-face {
  font-family: system;
  font-style: normal;
  font-weight: 300;
  src: local(".SFNSText-Light"), local(".HelveticaNeueDeskInterface-Light"), local(".LucidaGrandeUI"), local("Ubuntu Light"), local("Segoe UI Light"), local("Roboto-Light"), local("DroidSans"), local("Tahoma");
}
html {
  background-color: var(--main-bg);
  display: grid;
  height: 100vh;
  font-family: "system";
  width: 100vw;
  place-items: center;
}

article {
  display: flex;
  flex-flow: column wrap;
  place-items: center;
}

p, legend, label {
  color: #fff;
  font-size: 24px;
  margin: 4px 0;
}

svg {
  fill: var(--thumb-bg);
  width: 120px;
  height: 120px;
  filter: drop-shadow(-3px 6px 18px var(--shadow));
}
	
#test {
	margin-left: auto;
	margin-right: auto;
	text-align: center;
}

</style>
</head>

<body>
<article>

  <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"></path>
  </svg>

  <p> Welcome to Providence University! </p>
  <p> 410829785 Yuuzu~ </p>
  <br>
</article>
	
	<div id="test">
		<progress value="88" max="100">88%</progress>
	</div>
	
<br>
	
<fieldset>
	<legend> Rainbow Is Magic </legend>
	<div>
		<label>Color</label>
		<input list="color-list" type="text">
		<datalist id="color-list">
			<option value="Red" type="color">
			<option value="Orange">
			<option value="Yellow">
			<option value="Green">
			<option value="Blue">
			<option value="Cyan">
			<option value="Purple">
			</option>
		</datalist>
	</div>
	<br>
	
	<div>
		
	</div>
</fieldset>
</body>
</html>
