      <script id="rendered-js" >
const $ = q => document.querySelector(q);

const visualWidth = 318;
const visualHeight = 200;

const audio = $("audio");
const coverHolder = $("#cover-holder");
const cover = $(".song-meta figure img");
const progressBar = $("#progress-bar");

const audioContext = new AudioContext();
const source = audioContext.createMediaElementSource(audio);
const analyser = audioContext.createAnalyser();
let fileInfo = "";

source.connect(analyser);
analyser.connect(audioContext.destination);
analyser.fftSize = 1024;

const bufferLength = analyser.frequencyBinCount;
const frequencyData = new Uint8Array(bufferLength);

const bars = [];

for (let i = 1; i <= 128; i++) {
  bars.push(document.getElementById("bar-" + i));
}

const MusicVisuals = {
  rafId: null,
  start() {
    analyser.getByteFrequencyData(frequencyData);

    let barcc = 0;
    const numberOfBars = 128;

    for (let increment = -1; increment < numberOfBars * 2; increment += 2) {
      const y = frequencyData[increment];

      barcc++;

      if (barcc > numberOfBars) {
        barcc = 0;
      }

      const bar = bars[barcc];

      if (bar) {
        bar.style.transform = `translateZ(0) translateY(${275 - y}px)`;
      }
    }

    MusicVisuals.rafId = requestAnimationFrame(MusicVisuals.start);
  },
  stop() {
    cancelAnimationFrame(MusicVisuals.rafId);
  } };


$("#open-file").addEventListener("click", () => {
  audioContext.resume();
  $("#file-open").click();
});

$("#file-open").addEventListener("change", e => {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  audio.src = url;

  audio.
  play().
  then(() => {}).
  catch(() => {
    audio.pause();
    $(".box.title .intro p").innerHTML +=
    "<br><br><strong>Autoplay was blocked. Press play below to play!</strong>";
  });
});

$("#play-pause-button").addEventListener("click", () =>
audio.paused ? audio.play() : audio.pause());


$("audio").addEventListener("play", () => {
  $("#play-pause-button span").textContent = "pause";
  MusicVisuals.start();

  cover.style.animationPlayState = "running";
});

$("audio").addEventListener("pause", () => {
  $("#play-pause-button span").textContent = "play_arrow";

  for (let i = 0; i < bars.length; i++) {
    if (bars[i]) {
      bars[i].style.transform = null;
    }
  }

  MusicVisuals.stop();
  cover.style.animationPlayState = "paused";
});

$("audio").addEventListener("ended", () => {
  MusicVisuals.stop();
  cover.style.animationPlayState = "running";
});

const progressWidth = $(".progress").offsetWidth;

$("audio").addEventListener("timeupdate", () => {
  const p = audio.currentTime / audio.duration * 100;

  progressBar.style.width = p + "%";
});

$(".progress").addEventListener("click", e => {
  const mouseX = e.pageX;
  const boundingRect = e.target.getBoundingClientRect();
  const barX = boundingRect.left;
  const percent = boundingRect.width / (e.pageX - barX);

  audio.currentTime = audio.duration / percent;
});
