<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yuuzu - Youtube Premium</title>
    <link rel="stylesheet" href="sweetalert2.min.css">
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="yuuzu.css">
    <script src="jquery.min.js"></script>
    <script src="moment.min.js"></script>
    <script src="bootstrap.min.js"></script>
    <script src="sweetalert2.all.min.js"></script>
    <script src="vue.js"></script>
    <script src="vue-resource.js"></script>
    <script src="vuejs-countdown.js"></script>
</head>
<body>
<div id="app">
    <div class="container">
        <h1 id="headline">Countdown Youtube Premium: </h1>
        <div id="countdown">
            <ul>
                <li><span id="days"></span>days</li>
                <li><span id="hours"></span>Hours</li>
                <li><span id="minutes"></span>Minutes</li>
                <li><span id="seconds"></span>Seconds</li>
            </ul>
            <button @click="checkCost()" class="btn btn-primary">Check Cost</button>
        </div>
    </div>
</div>
<script src="yuuzu.js"></script>
</body>
</html>
