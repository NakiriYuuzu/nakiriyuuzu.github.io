<!DOCTYPE html>
<html>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Page Design</title>
<link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet" type="text/css">
<style type="text/css">
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  html, body {
  	width: 100%;
    height: 100%;
    margin: 0;
  }
  
  body {
    align-items: center;
    background-color: #ffffff;
    display: flex;
    font-family: -apple-system, 
      BlinkMacSystemFont, 
      "Segoe UI", 
      Roboto, 
      Oxygen-Sans, 
      Ubuntu, 
      Cantarell, 
      "Helvetica Neue", 
      sans-serif;
  }
  
  .container {
    color: #333;
    margin: 0 auto;
    text-align: center;
  }
  
  .cost {
  	width: auto;
	  height: auto;
	  background-color: aquamarine;
	  position: absolute;
	  border-radius: 30px;
	  top: 85%;
	  left: 50%;
	  transform: translate(-50%, -50%);
	  text-align: center;
  }
  
  h1 {
    font-weight: normal;
    letter-spacing: .125rem;
    text-transform: uppercase;
  }
  
  li {
    display: inline-block;
    font-size: 1.5em;
    list-style-type: none;
    padding: 1em;
    text-transform: uppercase;
  }
  
  li span {
    display: block;
    font-size: 4.5rem;
  }
  
  .message {
    font-size: 4rem;
    display: none;
    padding: 1rem;
  }
  
  .emoji {
    padding: 0 .25rem;
  }

  #btn {
  	background-color: #00ffff;
  }
  
  @media all and (max-width: 768px) {
    h1 {
      font-size: 1.5rem;
    }
    
    li {
      font-size: 1.125rem;
      padding: .75rem;
    }
    
    li span {
      font-size: 3.375rem;
    }
  }
</style>
<head>
</head>
<body>
<div class="container">
  <h1 id="headline">Countdown Youtube Premium: </h1>
  <div id="countdown">
    <ul>
      <li><span id="days"></span>days</li>
      <li><span id="hours"></span>Hours</li>
      <li><span id="minutes"></span>Minutes</li>
      <li><span id="seconds"></span>Seconds</li>
    </ul>
  </div>
  <div class="message">
    <div id="content">
      <span class="emoji">🥳</span>
      <span class="emoji">🎉</span>
      <span class="emoji">🎂</span>
    </div>
  </div>
</div>
</div>
<div class="cost">
	<button type="button" class="btn btn-lg" onClick="checkCost()">Check Cost</button>
</div>
<script type="text/javascript">
function checkCost() {
    let yt = 60;
    let px = 104;
    let wp = 91;
    let zy = 146;
    let lq = 13;
    alert("yt: " + yt + " px: " + px + " wp: " + wp + " zy: " + zy + " lq: " + lq);
}
(function() {
    const second = 1000,
          minute = second * 60,
          hour = minute * 60,
          day = hour * 24;

    let countDay = new Date().getMonth() + 2;
    
    function checkMonth(countDay) {
		if (countDay >= 1 && countDay <= 12) {

        	}
        	else if (countDay === 2){
				return birthday = "Feb 08, 2022 12:00:00";
        	}
        	else if (countDay === 3){
				return birthday = "Mar 08, 2022 12:00:00";
        	}
        	else if (countDay === 4){
				return birthday = "Apr 08, 2022 12:00:00";
        	} 
        	else if (countDay === 5){
				return birthday = "May 08, 2022 12:00:00";
        	} 
        	else if (countDay === 6){
				return birthday = "Jun 08, 2022 12:00:00";
        	} 
        	else if (countDay === 7){

        	} 
        	else if (countDay === 12){
				return birthday = "Dec 08, 2022 12:00:00";
        	}
		}
    }
		//
    let countDown = new Date(checkMonth(countDay)).getTime(),
        x = setInterval(function() {    

            let now = new Date().getTime(),
                distance = countDown - now;

            document.getElementById("days").innerText = Math.floor(distance / (day)),
            document.getElementById("hours").innerText = Math.floor((distance % (day)) / (hour)),
            document.getElementById("minutes").innerText = Math.floor((distance % (hour)) / (minute)),
            document.getElementById("seconds").innerText = Math.floor((distance % (minute)) / second);

            if (distance < 0) {
                countDay ++;
                let headline = document.getElementById("headline"),
                countdown = document.getElementById("countdown"),
                content = document.getElementById("content");
				
                headline.innerText = "";
                countdown.style.display = "none";
                content.style.display = "block";

                clearInterval(x);
            }
            //
        }, 1000)
		
}());
</script>
</body>
</html>
